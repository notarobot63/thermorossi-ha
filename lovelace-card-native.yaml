# Thermorossi card — 100% native HA (tile cards)
# No custom cards required

type: vertical-stack
cards:

  # ── 1. Main switch ───────────────────────────────────────────
  - type: tile
    entity: switch.thermorossi_poele
    name: Thermorossi Stove
    icon: mdi:fire
    color: deep-orange
    features:
      - type: toggle

  # ── 2. Power level + Fan speed ───────────────────────────────
  - type: grid
    columns: 2
    square: false
    cards:
      - type: tile
        entity: number.thermorossi_niveau_de_puissance
        name: Power
        icon: mdi:fire
        color: deep-orange
        features:
          - type: numeric-input
            style: slider
      - type: tile
        entity: number.thermorossi_vitesse_ventilateur
        name: Fan
        icon: mdi:fan
        color: blue
        features:
          - type: numeric-input
            style: slider

  # ── 3. Alarm banner (visible only when an alert is active) ───
  - type: conditional
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity: binary_sensor.thermorossi_alarme
            state: "on"
          - condition: state
            entity: binary_sensor.thermorossi_arret_erreur
            state: "on"
          - condition: state
            entity: binary_sensor.thermorossi_pellets_insuffisants
            state: "on"
    card:
      type: tile
      entity: binary_sensor.thermorossi_arret_erreur
      name: >
        {% if is_state('binary_sensor.thermorossi_arret_erreur', 'on') %}
          Stove stopped — {{ states('sensor.thermorossi_message_alarme') }}
        {% elif is_state('binary_sensor.thermorossi_alarme', 'on') %}
          {{ states('sensor.thermorossi_message_alarme') }}
        {% else %}
          Pellet reserve empty
        {% endif %}
      icon: mdi:fire-alert
      color: red

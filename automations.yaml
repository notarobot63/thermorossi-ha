# Thermorossi — Example automations
# Add to configuration.yaml:  automation: !include automations.yaml
# or paste into your existing automations.yaml.
#
# Notifications use notify.ntfy — adapt to your setup:
# notify.mobile_app_*, notify.signal, notify.pushover, etc.

# ─────────────────────────────────────────────────────────────────
# 1. GENERAL ALARM (any alarm bit set — reg[8]+reg[9])
#    Covers all alarm codes: pellets, start failure, flue gas...
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Alarm active"
  id: thermorossi_alarm_active
  trigger:
    - platform: state
      entity_id: binary_sensor.thermorossi_alarme
      to: "on"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: >
          Alarm: {{ states('sensor.thermorossi_message_alarme') }}

# ─────────────────────────────────────────────────────────────────
# 2. ERROR STOP (STOP state — reg[6]=8)
#    Stove stopped on fault (in addition to the alarm sensor)
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Error stop"
  id: thermorossi_stop_error
  trigger:
    - platform: state
      entity_id: binary_sensor.thermorossi_arret_erreur
      to: "on"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: >
          Stove stopped on error.
          Alarm: {{ states('sensor.thermorossi_message_alarme') }}

# ─────────────────────────────────────────────────────────────────
# 3. PELLETS LOW (hardware level sensor — reg[10])
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Pellets low"
  id: thermorossi_pellets_low
  trigger:
    - platform: state
      entity_id: binary_sensor.thermorossi_pellets_insuffisants
      to: "on"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: "Pellet reserve empty — refill the hopper"

# ─────────────────────────────────────────────────────────────────
# 4. STUCK IGNITION — clogged burner
#    Stove stays in START without reaching WORK after 25 min.
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Stuck ignition"
  id: thermorossi_stuck_start
  trigger:
    - platform: state
      entity_id: sensor.thermorossi_etat
      to: "start"
      for:
        minutes: 25
  condition:
    - condition: state
      entity_id: sensor.thermorossi_etat
      state: "start"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: "Ignition stuck for 25 min — burner may need cleaning"

# ─────────────────────────────────────────────────────────────────
# 5. UNEXPECTED SHUTDOWN DURING HEATING
#    Transition from WORK to OFF or STOP (pellets run out mid-session)
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Unexpected shutdown"
  id: thermorossi_unexpected_stop
  trigger:
    - platform: state
      entity_id: sensor.thermorossi_etat
      from: "work"
  condition:
    - condition: template
      value_template: >
        {{ trigger.to_state.state in ['off', 'stop'] }}
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: >
          Stove stopped during heating → {{ trigger.to_state.state }}.
          {% if states('binary_sensor.thermorossi_pellets_insuffisants') == 'on' %}
          Probable cause: pellets exhausted.
          {% elif states('binary_sensor.thermorossi_alarme') == 'on' %}
          Alarm: {{ states('sensor.thermorossi_message_alarme') }}
          {% else %}
          Check stove status.
          {% endif %}

# ─────────────────────────────────────────────────────────────────
# 6. HEATING STARTED (optional — confirms successful ignition)
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Heating started"
  id: thermorossi_work_started
  trigger:
    - platform: state
      entity_id: sensor.thermorossi_etat
      to: "work"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: >
          Stove heating — power level {{ states('sensor.thermorossi_niveau_de_puissance') }}/5

# ─────────────────────────────────────────────────────────────────
# 7. ALARM CLEARED
#    Notifies when all alarms are resolved
# ─────────────────────────────────────────────────────────────────
- alias: "Thermorossi - Alarm cleared"
  id: thermorossi_alarm_cleared
  trigger:
    - platform: state
      entity_id: binary_sensor.thermorossi_alarme
      to: "off"
      from: "on"
  action:
    - service: notify.ntfy
      data:
        title: "Thermorossi stove"
        message: "Alarm cleared — stove ready"

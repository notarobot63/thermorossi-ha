# Carte Thermorossi — Bubble Card + Mushroom
# Coller dans l'éditeur YAML du tableau de bord HA
# Nécessite: Bubble Card, Mushroom Cards, Card Mod

type: vertical-stack
cards:

  # ── 1. Carte principale ─────────────────────────────────────
  - type: custom:bubble-card
    card_type: button
    entity: switch.thermorossi_192_168_1_36_poele
    name: Poêle Thermorossi
    icon: |
      {% set s = states('sensor.thermorossi_192_168_1_36_etat') %}
      {% if s == 'Arrêt (erreur)' %} mdi:fire-alert
      {% elif s in ['Allumage', 'Chauffe', 'Temp. OK', 'En attente'] %} mdi:fire
      {% else %} mdi:fire-off
      {% endif %}
    show_state: false
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    sub_button:
      - entity: sensor.thermorossi_192_168_1_36_etat
        show_state: true
        show_icon: false
        tap_action:
          action: none
      - entity: number.thermorossi_192_168_1_36_niveau_de_puissance
        icon: mdi:fire
        show_state: true
        show_icon: true
        tap_action:
          action: none
      - entity: number.thermorossi_192_168_1_36_vitesse_ventilateur
        icon: mdi:fan
        show_state: true
        show_icon: true
        tap_action:
          action: none
      - entity: binary_sensor.thermorossi_192_168_1_36_alarme
        icon: mdi:alert-circle
        show_state: false
        show_icon: "{{ is_state('binary_sensor.thermorossi_192_168_1_36_alarme', 'on') or is_state('binary_sensor.thermorossi_192_168_1_36_arret_erreur', 'on') or is_state('binary_sensor.thermorossi_192_168_1_36_pellets_insuffisants', 'on') }}"
        tap_action:
          action: none
    styles: |
      .bubble-icon {
        {% set s = states('sensor.thermorossi_192_168_1_36_etat') %}
        {% if s == 'Arrêt (erreur)' %}
          color: rgb(211,47,47) !important;
        {% elif s == 'Chauffe' %}
          color: rgb(230,81,0) !important;
        {% elif s == 'Allumage' %}
          color: rgb(251,140,0) !important;
        {% elif s in ['Temp. OK', 'En attente'] %}
          color: rgb(255,193,7) !important;
        {% else %}
          color: var(--secondary-text-color) !important;
        {% endif %}
      }

  # ── 2. Sliders puissance + ventilation ──────────────────────
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-number-card
        entity: number.thermorossi_192_168_1_36_niveau_de_puissance
        name: Puissance
        icon: mdi:fire
        icon_color: deep-orange
        display_mode: slider
        layout: vertical
        card_mod:
          style: |
            ha-card { padding: 8px 12px; }
      - type: custom:mushroom-number-card
        entity: number.thermorossi_192_168_1_36_vitesse_ventilateur
        name: Ventilation
        icon: mdi:fan
        icon_color: blue
        display_mode: slider
        layout: vertical
        card_mod:
          style: |
            ha-card { padding: 8px 12px; }

  # ── 3. Zone alarme (visible uniquement si alerte active) ─────
  - type: conditional
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity: binary_sensor.thermorossi_192_168_1_36_alarme
            state: "on"
          - condition: state
            entity: binary_sensor.thermorossi_192_168_1_36_arret_erreur
            state: "on"
          - condition: state
            entity: binary_sensor.thermorossi_192_168_1_36_pellets_insuffisants
            state: "on"
    card:
      type: custom:mushroom-template-card
      primary: >
        {% if is_state('binary_sensor.thermorossi_192_168_1_36_arret_erreur', 'on') %}
          🛑 Poêle arrêté — {{ states('sensor.thermorossi_192_168_1_36_message_alarme') }}
        {% elif is_state('binary_sensor.thermorossi_192_168_1_36_alarme', 'on') %}
          ⚠️ {{ states('sensor.thermorossi_192_168_1_36_message_alarme') }}
        {% elif is_state('binary_sensor.thermorossi_192_168_1_36_pellets_insuffisants', 'on') %}
          ⚠️ Réserve pellets vide
        {% endif %}
      secondary: >
        {% if is_state('binary_sensor.thermorossi_192_168_1_36_arret_erreur', 'on') %}
          Vérifier le brûleur ou les pellets avant de relancer
        {% elif is_state('binary_sensor.thermorossi_192_168_1_36_pellets_insuffisants', 'on') %}
          Recharger le bac à pellets
        {% endif %}
      icon: >
        {% if is_state('binary_sensor.thermorossi_192_168_1_36_arret_erreur', 'on') %}
          mdi:fire-alert
        {% else %}
          mdi:alert-circle
        {% endif %}
      icon_color: red
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            background: linear-gradient(135deg,
              rgba(211,47,47,0.15) 0%,
              rgba(183,28,28,0.08) 100%);
            border: 1.5px solid rgba(211,47,47,0.4);
            padding: 8px 16px;
          }
